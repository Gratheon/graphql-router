#version: "3.9"
services:
  graphql-router:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # Use ts-node-dev for development with TypeScript
    # --respawn: Restart on crash
    # --transpile-only: Faster startup, skips type checking (rely on IDE/tsc for that)
    # --ignore-watch node_modules: Prevent restarts when node_modules change
    # src/graphql-router.ts: Path to the main entry file
    command: ./node_modules/.bin/ts-node-dev --respawn --transpile-only --ignore-watch node_modules src/graphql-router.ts
    ports:
      - "6100:6100"
    volumes:
      - .:/app/
    restart: always
    tty: true
    environment:
      - DOCKER_TAG=${DOCKER_TAG-latest}
      - ENV_ID=dev
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      - OTEL_SERVICE_NAME=graphql-router
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=dev,service.namespace=gratheon
      - HYPERDX_API_KEY=${HYPERDX_API_KEY:-local-gratheon-clickstack}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_SECRET=pass
