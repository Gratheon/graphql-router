version: '3.8'
services:
  graphql-router:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "6100:6100"
    environment:
      - DOCKER_TAG=${DOCKER_TAG-latest}
      - ENV_ID=prod
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://127.0.0.1:4318}
      - OTEL_SERVICE_NAME=graphql-router
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=prod,service.namespace=gratheon
      - HYPERDX_API_KEY=${HYPERDX_API_KEY:-}
      - REDIS_HOST=${REDIS_HOST:-127.0.0.1}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_SECRET=${REDIS_SECRET:-pass}
    restart: always
    network_mode: host
